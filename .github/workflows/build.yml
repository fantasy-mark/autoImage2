name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target registry hostname"
        required: false
        default: "ghcr.io"
        type: string
      namespace:
        description: "Target registry namespace (image owner)"
        required: false
        default: ""
        type: string
      image:
        description: "Image name (e.g. nacos/nacos-server)"
        required: true
        type: string
      version:
        description: "Image tag (e.g. v2.5.2)"
        required: false
        default: "latest"
        type: string
  push:
    branches: [ main ]
    paths:
      - "Dockerfile"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build inputs
        id: inputs
        run: |
          echo "repo=${{ inputs.repo || 'ghcr.io' }}" >> "$GITHUB_OUTPUT"
          echo "namespace=${{ inputs.namespace || github.repository_owner }}" >> "$GITHUB_OUTPUT"
          echo "image=${{ inputs.image }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.version || 'latest' }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ steps.inputs.outputs.repo }}
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.inputs.outputs.repo }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: >-
            ${{ steps.inputs.outputs.repo }}/${{ steps.inputs.outputs.namespace }}/${{ steps.inputs.outputs.image }}:${{ steps.inputs.outputs.version }}
